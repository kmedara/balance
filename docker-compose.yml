services:
  angular:
    networks:
      - balance
    depends_on:
      - node
    build:
      context: ./client
      dockerfile: ./Dockerfile
      secrets:
        - npmrc
    ports:
      - "4200:4200"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - GATEWAY=${GATEWAY}
    volumes:
      - ./client/src:/app/src
      - ./client/angular.json:/app/angular.json
      - ./client/tsconfig.json:/app/tsconfig.json
  node:
    networks:
      - balance
    build:
      context: ./api
      dockerfile: ./Dockerfile
      secrets: 
        - npmrc
    ports:
      - "3000:3000"
    environment:
      - PLAID_CLIENT_ID=${PLAID_CLIENT_ID}
      - PLAID_SECRET=${PLAID_SECRET}
      - PLAID_PRODUCTS=${PLAID_PRODUCTS}
      - PLAID_HOST=${PLAID_HOST}
      - PLAID_COUNTRY_CODES=${PLAID_COUNTRY_CODES}
      - PLAID_ENV=${PLAID_ENV}
      - PLAID_CLIENT_NAME=${PLAID_CLIENT_NAME}
      - PLAID_REDIRECT_URI=${PLAID_REDIRECT_URI}
      - MONGO_URL=${MONGO_URL}
      - ACCESS_TOKEN_ENCRYPTION_KEY=${ACCESS_TOKEN_ENCRYPTION_KEY}
   
  mongo:
    image: mongo:6
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:

secrets:
  npmrc:
    file: ~/.npmrc
networks:
  balance:
    name: balance
